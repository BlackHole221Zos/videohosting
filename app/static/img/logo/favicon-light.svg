<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gruvGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#689d6a"/>
      <stop offset="100%" stop-color="#d79921"/>
    </linearGradient>
    <linearGradient id="screenGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#458588"/>
      <stop offset="100%" stop-color="#689d6a"/>
    </linearGradient>
    <filter id="glowLight">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Антенна -->
  <line x1="26" y1="10" x2="20" y2="2" stroke="url(#gruvGradLight)" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="10" x2="44" y2="2" stroke="url(#gruvGradLight)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="20" cy="2" r="2" fill="#d79921"/>
  <circle cx="44" cy="2" r="2" fill="#d79921"/>

  <!-- Корпус телевизора -->
  <rect x="8" y="12" width="48" height="40" rx="6" fill="#fbf1c7" stroke="url(#gruvGradLight)" stroke-width="2.5"/>

  <!-- Экран -->
  <rect x="14" y="18" width="32" height="24" rx="3" fill="url(#screenGradLight)" opacity="0.85" filter="url(#glowLight)"/>

  <!-- Сканлайны на экране -->
  <rect x="14" y="20" width="32" height="1" fill="#000" opacity="0.15"/>
  <rect x="14" y="24" width="32" height="1" fill="#000" opacity="0.15"/>
  <rect x="14" y="28" width="32" height="1" fill="#000" opacity="0.15"/>
  <rect x="14" y="32" width="32" height="1" fill="#000" opacity="0.15"/>
  <rect x="14" y="36" width="32" height="1" fill="#000" opacity="0.15"/>
  <rect x="14" y="40" width="32" height="1" fill="#000" opacity="0.15"/>

  <!-- Символ Play на экране -->
  <polygon points="26,26 26,36 36,31" fill="#d79921" opacity="0.8"/>

  <!-- Кнопки -->
  <circle cx="14" cy="48" r="2" fill="url(#gruvGradLight)"/>
  <circle cx="22" cy="48" r="2" fill="url(#gruvGradLight)"/>
  <circle cx="30" cy="48" r="2" fill="url(#gruvGradLight)"/>

  <!-- Ножки -->
  <rect x="14" y="54" width="10" height="4" rx="2" fill="url(#gruvGradLight)"/>
  <rect x="40" y="54" width="10" height="4" rx="2" fill="url(#gruvGradLight)"/>
</svg>