<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gruvGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8ec07c"/>
      <stop offset="100%" stop-color="#fabd2f"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#83a598"/>
      <stop offset="100%" stop-color="#8ec07c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Антенна -->
  <line x1="26" y1="10" x2="20" y2="2" stroke="url(#gruvGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="10" x2="44" y2="2" stroke="url(#gruvGrad)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="20" cy="2" r="2" fill="#fabd2f"/>
  <circle cx="44" cy="2" r="2" fill="#fabd2f"/>

  <!-- Корпус телевизора -->
  <rect x="8" y="12" width="48" height="40" rx="6" fill="#282828" stroke="url(#gruvGrad)" stroke-width="2.5"/>

  <!-- Экран -->
  <rect x="14" y="18" width="32" height="24" rx="3" fill="url(#screenGrad)" opacity="0.9" filter="url(#glow)"/>

  <!-- Сканлайны на экране -->
  <rect x="14" y="20" width="32" height="1" fill="#000" opacity="0.2"/>
  <rect x="14" y="24" width="32" height="1" fill="#000" opacity="0.2"/>
  <rect x="14" y="28" width="32" height="1" fill="#000" opacity="0.2"/>
  <rect x="14" y="32" width="32" height="1" fill="#000" opacity="0.2"/>
  <rect x="14" y="36" width="32" height="1" fill="#000" opacity="0.2"/>
  <rect x="14" y="40" width="32" height="1" fill="#000" opacity="0.2"/>

  <!-- Символ Play на экране -->
  <polygon points="26,26 26,36 36,31" fill="#fabd2f" opacity="0.8"/>

  <!-- Кнопки -->
  <circle cx="14" cy="48" r="2" fill="url(#gruvGrad)"/>
  <circle cx="22" cy="48" r="2" fill="url(#gruvGrad)"/>
  <circle cx="30" cy="48" r="2" fill="url(#gruvGrad)"/>

  <!-- Ножки -->
  <rect x="14" y="54" width="10" height="4" rx="2" fill="url(#gruvGrad)"/>
  <rect x="40" y="54" width="10" height="4" rx="2" fill="url(#gruvGrad)"/>
</svg>